name: Bug Report
description: Report a problem with scrolex
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the current behavior. May include logs, images, or videos.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If possible, attach a PDF that triggers the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe the behavior you expect.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: scrolex version
      description: Output of `scrolex --version`.
      placeholder: "scrolex 0.6.1"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install scrolex?
      options:
        - Flatpak
        - Built from source (cargo)
        - Other (specify in Problem)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / distribution
      placeholder: "e.g. Arch Linux, Fedora 40, Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: TRACE logs
      description: |
        Reproduce the bug with TRACE logging enabled and paste the output:

        ```
        RUST_LOG=scrolex=trace scrolex your-file.pdf
        ```

        (Flatpak: `flatpak run --env=RUST_LOG=scrolex=trace com.andr2i.scrolex your-file.pdf`)
      render: text
    validations:
      required: true
